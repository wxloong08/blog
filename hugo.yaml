baseURL: https://blog.visionloong.com/
locale: zh-cn
title: wxloong08
theme: stack
hasCJKLanguage: true
enableEmoji: true

pagination:
  pagerSize: 5

permalinks:
  posts: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - posts
  rssFullContent: true
  favicon: /favicon.svg

  footer:
    since: 2026

  sidebar:
    emoji: ⚡
    subtitle: Agent 调研链路 · 搜索与清洗 · VPS 工具环境

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: true
      default: "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

  comments:
    enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  opengraph:
    twitter:
      card: summary_large_image

  colorScheme:
    toggle: true
    default: auto

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 1
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
    - identifier: search
      name: 搜索
      url: /search/
      weight: 3
    - identifier: about
      name: 关于
      url: /about/
      weight: 4

  social:
    - identifier: github
      name: GitHub
      url: https://github.com/wxloong08
      params:
        icon: brand-github

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100

markup:
  highlight:
    style: dracula
    noClasses: false
